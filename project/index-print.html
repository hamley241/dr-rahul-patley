<style>
  /* Print-ready overrides */
  @page { size: A4; margin: 12mm; }

  @media print {
    html, body { background: #fff !important; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

    /* Kill fixed/sticky chrome */
    .nav { position: static !important; border-bottom: 1px solid #ddd !important; }
    .fab, .tw-fab, .tweaks-panel, .tw-panel { display: none !important; }

    /* Modals/backdrops never print */
    .modal-backdrop, .archive-backdrop { display: none !important; }

    /* Sections: avoid awkward mid-section breaks where possible */
    section { padding: 28px 0 !important; break-inside: avoid-page; page-break-inside: avoid; }
    .hero { padding-top: 20px !important; }

    /* Encourage page breaks between major sections */
    section + section { break-before: auto; }
    #about, #services, #assessments, #breathe, #research, #book, #policy, #press, #testimonials, #faq, #contact {
      break-before: page; page-break-before: always;
    }

    /* Keep headings attached to their content */
    h1, h2, h3, h4 { break-after: avoid-page; page-break-after: avoid; }
    .sec-head { break-after: avoid-page; page-break-after: avoid; }

    /* No hover/transition artifacts */
    *, *::before, *::after { transition: none !important; animation: none !important; }

    /* Cards/list items shouldn't split */
    .pub, .archive-item, .faq-item, .service, .credential, .testimonial,
    .stat, .policy-item, .press-item, .contact-card, .breath-wrap {
      break-inside: avoid; page-break-inside: avoid;
    }

    /* Map iframe can't print usefully — swap to a note */
    .map iframe { display: none !important; }
    .map { aspect-ratio: auto !important; padding: 16px; text-align: center; }
    .map::after {
      content: 'Sukoon Psychiatry Centre — Banjara Hills, Hyderabad';
      font-family: var(--ff-display); font-size: 14px; color: var(--ink-soft);
    }

    /* Ensure images don't overflow */
    img { max-width: 100% !important; break-inside: avoid; }

    /* Show full URL next to external links for reference */
    a[href^="http"]::after {
      content: " (" attr(href) ")";
      font-size: 9px; color: #888; word-break: break-all;
    }
    a[href^="#"]::after, a[href^="mailto:"]::after, a[href^="tel:"]::after { content: none; }

    /* Footer compact */
    .footer { padding: 20px 0 !important; }
  }
</style>

<script type="text/babel">
  // Auto-print once everything is ready
  (async () => {
    // Wait for fonts
    if (document.fonts && document.fonts.ready) {
      try { await document.fonts.ready; } catch (e) {}
    }
    // Wait for React app to mount
    const waitForApp = () => new Promise(res => {
      const check = () => {
        const app = document.getElementById('app');
        if (app && app.children.length > 0) res();
        else setTimeout(check, 100);
      };
      check();
    });
    await waitForApp();
    // Extra settle time
    await new Promise(r => setTimeout(r, 800));
    window.print();
  })();
</script>
